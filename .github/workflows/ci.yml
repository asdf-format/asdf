name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  push:
    branches:
      - main
      - '*.x'
    tags:
      - '*'
  pull_request:
    # We also want this workflow triggered if the `jsonschema` label is
    # added or present when PR is updated
    types:
      - synchronize
      - labeled

permissions: {}

# Only cancel in-progress jobs or runs for the current workflow
#   This cancels the already triggered workflows for a specific PR without canceling
#   other instances of this workflow (other PRs, scheduled triggers, etc) when something
#   within that PR re-triggers this CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
    - uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d # v2.0.5
  type-checking:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        # Run type checking against the oldest supported version
        python-version: "3.10"
    - run: pip install -e ".[all,tests,typing]"
    - run: pyrefly check --output-format=github
  core-generate-jobs:
    runs-on: ubuntu-latest
    outputs:
      session: ${{ steps.set-matrix.outputs.session }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: wntrblm/nox@3284968a16fa5bd7fc0cc64a69a531404ccb4756 # 2026.07.11
    - id: set-matrix
      shell: bash
      run: echo session=$(nox --json -l -t core | jq -c '[.[].session]') | tee --append $GITHUB_OUTPUT
  core:
    name: ${{ matrix.session }}
    needs: [core-generate-jobs]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        session: ${{ fromJson(needs.core-generate-jobs.outputs.session) }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
          fetch-depth: 0
          persist-credentials: false
    - uses: | # v8.3.2 # zizmor: ignore[cache-poisoning] this workflow doesn't publish any artifacts
        astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
    - uses: wntrblm/nox@3284968a16fa5bd7fc0cc64a69a531404ccb4756 # 2026.07.11
    - run: nox -v -s "${MATRIX_SESSION}"
      env:
        MATRIX_SESSION: ${{ matrix.session }}
  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
          fetch-depth: 0
          persist-credentials: false
    - uses: | # v8.3.2 # zizmor: ignore[cache-poisoning] this workflow doesn't publish any artifacts
        astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
    - uses: wntrblm/nox@3284968a16fa5bd7fc0cc64a69a531404ccb4756 # 2026.07.11
    - run: nox -v -s coverage
    - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
  test-platform:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
          fetch-depth: 0
          persist-credentials: false
    - uses: | # v8.3.2 # zizmor: ignore[cache-poisoning] this workflow doesn't publish any artifacts
        astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
    - uses: wntrblm/nox@3284968a16fa5bd7fc0cc64a69a531404ccb4756 # 2026.07.11
    - run: nox -v -s "core-3.11"
