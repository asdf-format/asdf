name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  push:
    branches:
      - main
      - '*.x'
    tags:
      - '*'
  pull_request:
    # We also want this workflow triggered if the `jsonschema` label is
    # added or present when PR is updated
    types:
      - synchronize
      - labeled

permissions: {}

# Only cancel in-progress jobs or runs for the current workflow
#   This cancels the already triggered workflows for a specific PR without canceling
#   other instances of this workflow (other PRs, scheduled triggers, etc) when something
#   within that PR re-triggers this CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
    - uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d # v2.0.5
  type-checking:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        # Run type checking against the oldest supported version
        python-version: "3.10"
    - run: pip install -e ".[all,tests,typing]"
    - run: pyrefly check --output-format=github
  core:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@afacbe8ebafa67b369e1f605b4f6989284ba2e87 # v2.6.5
    with:
      submodules: false
      envs: |
        - linux: coverage
          name: Python 3.14 coverage
          python-version: 3.14
        - linux: coverage
          name: Python 3.13 coverage
          python-version: 3.13
        - linux: coverage
          name: Python 3.12 coverage
          python-version: 3.12
        - linux: coverage
          name: Python 3.11 coverage
          python-version: 3.11
        - linux: coverage
          name: Python 3.10 coverage
          python-version: 3.10
      coverage: codecov

  jsonschema:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@afacbe8ebafa67b369e1f605b4f6989284ba2e87 # v2.6.5
    if: (github.repository == 'asdf-format/asdf' && (github.event_name == 'schedule' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'jsonschema')))
    with:
      submodules: false
      envs: |
        - linux: jsonschema
          python-version: 3.12

  asdf-schemas:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@afacbe8ebafa67b369e1f605b4f6989284ba2e87 # v2.6.5
    with:
      submodules: false
      envs: |
        - linux: asdf-standard
          python-version: 3.12
        - linux: asdf-transform-schemas
          python-version: 3.12

  test:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@afacbe8ebafa67b369e1f605b4f6989284ba2e87 # v2.6.5
    with:
      submodules: false
      envs: |
        - macos: py311-parallel
        - windows: py311-parallel

  dev:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@afacbe8ebafa67b369e1f605b4f6989284ba2e87 # v2.6.5
    with:
      submodules: false
      envs: |
        - linux: py310-coverage-devdeps-parallel
        - linux: py311-coverage-devdeps-parallel
        - linux: py312-coverage-devdeps-parallel
        - linux: py313-coverage-devdeps-parallel
        - linux: py314-coverage-devdeps-parallel
        - linux: py315-coverage-pytestdev-parallel
          python-version: 3.15
        # separate pytest so a failure here doesn't cause the whole suite to fail
        - linux: py314-coverage-pytestdev-parallel
      coverage: codecov

  oldest:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@afacbe8ebafa67b369e1f605b4f6989284ba2e87 # v2.6.5
    with:
      submodules: false
      envs: |
        - linux: py310-oldestdeps-parallel

  compatibility:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@afacbe8ebafa67b369e1f605b4f6989284ba2e87 # v2.6.5
    with:
      submodules: false
      envs: |
        - linux: compatibility
          python-version: 3.11

  mocks3:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@afacbe8ebafa67b369e1f605b4f6989284ba2e87 # v2.6.5
    with:
      submodules: false
      envs: |
        - linux: mocks3
          python-version: 3.12
